name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Supabase CLI setup
        uses: supabase/setup-cli@v1
      - name: Run DB Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase db push --project-ref $PROJECT_ID --confirm
      - name: Build Docker
        run: docker build -t my-whatsapp-bot:latest .
      - name: Push Docker Image
        env:
          DOCKER_REGISTRY: ghcr.io
          IMAGE_NAME: ghcr.io/myorg/my-whatsapp-bot
        run: |
          echo ${{ secrets.GHCR_PAT }} | docker login $DOCKER_REGISTRY -u ${{ github.actor }} --password-stdin
          docker tag my-whatsapp-bot:latest $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest
      - name: Deploy to Production
        run: echo "Deployment steps here (e.g. SSH to server, pull image, restart service)"
